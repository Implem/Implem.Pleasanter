<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<title>Pleasanter Site Visualizer</title>
	<style>
        /* html内のcssは、タイトルとギアのみ共通。ほぼほぼsitesetingの為の定義となっている。 */
		table {
			border-collapse: collapse;
			margin-top: 1em;
			min-width: max-content;
		}

		th,
		td {
			border: 1px solid #888;
			padding: 4px 8px;
			background: #fff;
		}

		textarea {
			width: 100%;
			height: 120px;
		}

		th {
			background: #e6f2ff;
		}

		td.missing {
			background: #f2f2f2;
		}

		td.changed {
			background: #fffbe6;
		}

		.scroll-table-wrapper {
			width: 100%;
			max-width: 100vw;
			max-height: none;
			overflow: auto;
			position: relative;
		}

		.scroll-table-wrapper > table {
			cursor: grab;
		}

		.scroll-table-wrapper > table.is-grabbing {
			cursor: grabbing;
			user-select: none;
		}

		.scroll-table-wrapper > table.is-grabbing * {
			cursor: grabbing !important;
		}

		body.alt-selecting .scroll-table-wrapper > table,
		body.alt-selecting .scroll-table-wrapper > table * {
			cursor: text !important;
		}

		thead tr:nth-child(1) th.sticky-col,
		thead tr:nth-child(2) th.sticky-col {
			z-index: 6;
		}

		thead tr:nth-child(1) th {
			position: sticky;
			top: 0;
			z-index: 5;
		}

		thead tr:nth-child(2) th {
			position: sticky;
			top: 38px;
			z-index: 5;
		}

		.sticky-col {
			position: sticky;
			left: 0;
			z-index: 4;
			/*background: #e6f2ff;*/
		}

		tbody td.sticky-col {
			background: #f6faff;
			z-index: 2;
		}

		tbody th.sticky-col {
			background: #f6faff;
		}

		.tab-btn {
			margin: 2px;
			padding: 4px 12px;
			border: 1px solid #888;
			background: #f8f8f8;
			cursor: pointer;
		}

		.tab-btn.active {
			background: #e6f2ff;
			font-weight: bold;
		}

		.table-title {
			font-weight: bold;
			margin: 12px 0 4px 0;
		}

		/* Array */
		td pre {
			margin: 0;
			white-space: nowrap;
			font-family: inherit;
		}

		span.item-pair {
			border: solid 1px #8f8f8f;
			padding: 2px;
			margin: 2px;
			border-radius: 6px;

			span {
				margin: 2px;
			}

			span.DbColumnName {
				display: none;
				color: #888;
			}

			span.DbColumnName:before {
				content: "(";
			}

			span.DbColumnName:after {
				content: ")";
			}

			span.Value {
				background-color: #f5d9ae;
			}

			span.Type {
				display: none;
				background-color: #efbbaa;
			}

			span.Order {
				background-color: #f5d9ae;
			}
		}

		td pre {
			margin: 0;
			white-space: nowrap;
			font-family: inherit;
		}

		span.item-single {
			border: solid 1px #8f8f8f;
			padding: 2px;
			margin: 2px;
			border-radius: 6px;
		}

		/* ヘッダー */
		.site-visualizer-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 8px 18px 8px 38px;
		}

		/* ギアアイコンとメニュー用追加CSS */
		.common-gear {
			position: relative;
			top: auto;
			right: auto;
			z-index: 100;
			width: 28px;
			height: 28px;
			background: none;
			border: none;
			cursor: pointer;
			padding: 0;
		}

		.common-gear svg {
			width: 100%;
			height: 100%;
			fill: #666;
			transition: fill 0.2s;
		}

		.common-gear:hover svg {
			fill: #2196f3;
		}

		.common-gear-menu-popup {
			position: absolute;
			top: 36px;
			right: 0;
			z-index: 200;
			background: #fff;
			border: 1px solid #aaa;
			border-radius: 4px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
			min-width: 140px;
			padding: 4px 0;
			font-size: 15px;
		}

		.common-gear-menu-item {
			padding: 8px 18px 8px 16px;
			cursor: pointer;
			white-space: nowrap;
		}

		.common-gear-menu-item:hover {
			background: #e6f2ff;
		}

		.common-gear-dialog-bg {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			background: rgba(0, 0, 0, 0.18);
			z-index: 300;
		}

		.common-gear-dialog {
			position: fixed;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			background: #fff;
			border-radius: 8px;
			box-shadow: 0 4px 24px rgba(0, 0, 0, 0.18);
			min-width: 320px;
			max-width: 90vw;
			max-height: 80vh;
			overflow: auto;
			z-index: 301;
			padding: 18px 24px 18px 24px;
		}

		.common-gear-dialog-title {
			font-weight: bold;
			font-size: 18px;
			margin-bottom: 10px;
		}

		.common-gear-dialog-close {
			position: absolute;
			top: 10px;
			right: 16px;
			font-size: 20px;
			color: #888;
			cursor: pointer;
		}

		.common-gear-dialog-content pre {
			background: #f8f8f8;
			padding: 8px;
			border-radius: 4px;
			font-size: 13px;
			overflow-x: auto;
		}

		.common-gear-error-indicator {
			position: absolute;
			top: 2px;
			right: 2px;
			width: 16px;
			height: 16px;
			z-index: 110;
			pointer-events: none;
		}

		.common-gear-error-indicator svg {
			width: 100%;
			height: 100%;
			display: block;
		}

		#mainTabButtons {
			margin: 0 0 0 0;
		}

		.user-input {
			margin-bottom: 0;
		}

	</style>
	<link rel="stylesheet" href="{{ApplicationPath}}Extensions/smt-json-to-table-er.css">
	<link rel="stylesheet" href="{{ApplicationPath}}Extensions/smt-json-to-table-process.css">
	<script {{nonce}} src="{{ApplicationPath}}Extensions/mermaid-11.9.0.min.js" defer></script>
	<script {{nonce}} src="{{ApplicationPath}}Extensions/d3.v7.min.js" defer></script>
	<script {{nonce}} src="{{ApplicationPath}}Extensions/smt-json-to-table-sitesetting.js" defer></script>
	<script {{nonce}} src="{{ApplicationPath}}Extensions/smt-json-to-table-er.js" defer></script>
	<script {{nonce}} src="{{ApplicationPath}}Extensions/smt-json-to-table-process.js" defer></script>
</head>

<body>
	<div class="site-visualizer-header">
		<img src="{{ApplicationPath}}images/SiteVisualizer-icon.svg" alt="Pleasanter Site Visualizer" style="height: 20px;">
		<button class="common-gear" id="commonGearBtn" title="Settings">
			<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
				<path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.4 7.4 0 0 0-1.62-.94l-.36-2.54A.48.48 0 0 0 14 2.4h-3.84a.48.48 0 0 0-.47.41l-.36 2.54a7.4 7.4 0 0 0-1.62.94l-2.39-.96a.48.48 0 0 0-.59.22L2.81 8.87a.48.48 0 0 0 .12.61l2.03 1.58c-.05.3-.07.63-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41H14c.24 0 .44-.17.47-.41l.36-2.54a7.4 7.4 0 0 0 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.09-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/>
			</svg>
		</button>
	</div>
	<div class="user-input" style="display: none;">
		<textarea id="jsonInput" data-i18n="common_sample_json" data-i18n-attr="placeholder" placeholder="ここにJSONを貼り付けてください"></textarea>
		<br>
		<button id="convertBtn" data-i18n="common_convert">変換</button>
	</div>
	<div id="mainTabButtons" style="margin: 10px 0;">
		<button id="mainTabSiteSetting" class="tab-btn active" data-i18n="ss_site_setting">Site Setting</button>
		<button id="mainTabERDiagrams" class="tab-btn" data-i18n="ss_er_diagram">ER Diagram</button>
		<button id="mainTabProcess" class="tab-btn" data-i18n="ss_process">Process</button>
	</div>
	<div id="mainContentWrapper">
		<div id="siteSettingArea">
			<div id="siteSelectorWrapper" style="margin: 10px 0;">
				<select id="siteSelector"></select>
			</div>
			<div id="tabButtons" style="margin: 10px 0;"></div>
			<div id="tableContainer"></div>
		</div>
		<div id="erDiagramArea" style="display:none;">
			<div id="erDiagramContainer" style="margin-top:10px;">
				<!-- ER UI will be rendered by smt-json-to-table-er.js -->
			</div>
		</div>
		<div id="processArea" style="display:none;">
			<div id="processContainer" style="margin-top:10px;">
				<!-- Process UI will be rendered by smt-json-to-table-process.js -->
			</div>
		</div>
	</div>
	<!-- ギアアイコン（ヘッダー内に移動済み） -->
	<span id="commonGearErrorIndicator" class="common-gear-error-indicator" style="display:none;">
		<svg viewBox="0 0 20 20">
			<circle cx="10" cy="10" r="10" fill="#e53935" />
			<text x="10" y="15" text-anchor="middle" font-size="14" fill="#fff" font-family="Arial"
				font-weight="bold">i</text>
		</svg>
	</span>
	<!-- ポップアップメニュー・ダイアログはJSで動的生成 -->
	<script {{nonce}}>
		// 共通部
		class Common {
			static get textarea() { return document.getElementById('jsonInput'); }
			static escapeHtml(str) {
				if (str == null) return '';
				return String(str).replace(/[&<>"']/g, m =>
					({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]
				);
			}
			static parseJsonSafe() {
				try { return JSON.parse(Common.textarea.value || '{}'); } catch { return {}; }
			}
			/**
		 * ダイアログを表示する。
		 * @param {string} innerHtml - ダイアログ内に表示する HTML 文字列。
		 *   この引数はサニタイズ **されない** ため、呼び出し元で
		 *   ユーザー由来の値には必ず Common.escapeHtml() を適用すること。
		 */
		static showDialog(innerHtml) {
				Common.closeDialog();
				const bg = document.createElement('div');
				bg.className = 'common-gear-dialog-bg';
				bg.onclick = Common.closeDialog;
				const dlg = document.createElement('div');
				dlg.className = 'common-gear-dialog';
				dlg.innerHTML = innerHtml + '<span class="common-gear-dialog-close" title="Close" onclick="this.closest(\'.common-gear-dialog\').parentNode.remove();event.stopPropagation();">&times;</span>';
				bg.appendChild(dlg);
				document.body.appendChild(bg);
				Common._dialogBg = bg;
			}
			static closeDialog() {
				if (Common._dialogBg) {
					Common._dialogBg.remove();
					Common._dialogBg = null;
				}
			}
			static getAllLogs() {
				const data = Common.parseJsonSafe();
				const logs = []
					.concat(data.SiteSetting?.Info?.Logs || [])
					.concat(data.ERDiagrams?.Info?.Logs || [])
					.concat(data.Process?.Info?.Logs || []);
				return logs;
			}
			static updateGearErrorIndicator() {
				let hasError = false;
				try {
					const logs = Common.getAllLogs();
					if (Array.isArray(logs)) hasError = logs.some(l => l.Level === 'Error');
				} catch { }
				const indicator = document.getElementById('commonGearErrorIndicator');
				if (indicator) indicator.style.display = hasError ? '' : 'none';
			}
			static positionGearErrorIndicator() {
				const gear = document.getElementById('commonGearBtn');
				const indicator = document.getElementById('commonGearErrorIndicator');
				if (!gear || !indicator) return;
				const rect = gear.getBoundingClientRect();
				indicator.style.top = (rect.top + 2) + 'px';
				indicator.style.left = (rect.right - 18) + 'px';
			}
		}

		// ギアメニュー
		class GearMenu {
			constructor() {
				this.menuPopup = null;
				document.getElementById('commonGearBtn').addEventListener('click', e => {
					e.stopPropagation();
					this.close();
					this.open();
				});
			}
			open() {
				if (this.menuPopup) return;
				const popup = document.createElement('div');
				popup.className = 'common-gear-menu-popup';

				const fileInfoItem = document.createElement('div');
				fileInfoItem.className = 'common-gear-menu-item';
				fileInfoItem.textContent = 'File Info';
				fileInfoItem.onclick = () => { this.close(); this.showFileInfoDialog(); };
				popup.appendChild(fileInfoItem);

				const logViewItem = document.createElement('div');
				logViewItem.className = 'common-gear-menu-item';
				logViewItem.textContent = 'Show Logs';
				logViewItem.onclick = () => { this.close(); this.showLogsDialog(); };
				popup.appendChild(logViewItem);

				document.body.appendChild(popup);
				this.menuPopup = popup;
				setTimeout(() => {
					document.addEventListener('mousedown', this._outside, { capture: true });
				}, 0);
			}
			close() {
				if (this.menuPopup) {
					this.menuPopup.remove();
					this.menuPopup = null;
					document.removeEventListener('mousedown', this._outside, { capture: true });
				}
			}
			_outside = (e) => {
				if (this.menuPopup && !this.menuPopup.contains(e.target) && e.target.id !== 'commonGearBtn') {
					this.close();
				}
			}
			showFileInfoDialog() {
				const data = Common.parseJsonSafe();
				const info = data.Info || {};
				const siteInfo = data?.SiteSetting?.Info || {};
				const erdInfo = data?.ERDiagrams?.Info || {};
				let html = '<div class="common-gear-dialog-title">File Info</div>';
				html += '<div class="common-gear-dialog-content">';
				html += '<b>Info:</b><br><pre>' + Common.escapeHtml(JSON.stringify(info, null, 2)) + '</pre>';
				html += '<b>SiteSetting.Info:</b><br><pre>' + Common.escapeHtml(JSON.stringify(siteInfo, null, 2)) + '</pre>';
				html += '<b>ERDiagrams.Info:</b><br><pre>' + Common.escapeHtml(JSON.stringify(erdInfo, null, 2)) + '</pre>';
				html += '</div>';
				Common.showDialog(html);
			}
			showLogsDialog() {
				const logs = Common.getAllLogs();
				let html = '<div class="common-gear-dialog-title">Show Logs</div>';
				html += '<div class="common-gear-dialog-content">';
				if (Array.isArray(logs) && logs.length > 0) {
					html += '<table style="border-collapse:collapse;width:100%;font-size:13px;">';
					html += '<thead><tr>';
					const columns = Object.keys(logs[0]);
					columns.forEach(col => html += `<th style="border:1px solid #888;padding:4px 8px;background:#e6f2ff;">${Common.escapeHtml(col)}</th>`);
					html += '</tr></thead><tbody>';
					logs.forEach(log => {
						html += '<tr>';
						columns.forEach(col => {
							let style = 'border:1px solid #888;padding:4px 8px;';
							if (log.Level === 'Error') style += 'background:#ffeaea;color:#c00;';
							else if (log.Level === 'Warning') style += 'background:#fffbe6;color:#b8860b;';
							html += `<td style="${style}">${Common.escapeHtml(log[col])}</td>`;
						});
						html += '</tr>';
					});
					html += '</tbody></table>';
				} else {
					html += '<span style="color:#888;">No logs available.</span>';
				}
				html += '</div>';
				Common.showDialog(html);
			}
		}

		// 起動とタブ制御
		class App {
			constructor() {
				this.site = new SiteSetting();
				this.er = new ERDiagram();
				this.process = new ProcessView();
				this.menu = new GearMenu();
				// convert ボタンは App が責務を持つ（SiteSetting.bind から移譲）
				document.getElementById('convertBtn').onclick = () => {
					try { this.site.renderFromData(Common.parseJsonSafe()); } catch (ex) { console.error(ex); }
					Common.updateGearErrorIndicator();
					Common.positionGearErrorIndicator();
					document.title = 'Pleasanter Site Visualizer';
				};
				this.bindTabs();
				window.addEventListener('resize', Common.positionGearErrorIndicator);
				document.addEventListener('keydown', e => {
					if (e.key === 'Escape') Common.closeDialog();
				});
				// ↓ 追加: Mermaidスクロール領域の高さをウィンドウリサイズで調整
				window.addEventListener('resize', App.adjustMermaidScrollWrapperHeight);
			}
			bindTabs() {
				document.getElementById('mainTabSiteSetting').onclick = () => this.setMainTab('SiteSetting');
				document.getElementById('mainTabERDiagrams').onclick = () => this.setMainTab('ERDiagrams');
				document.getElementById('mainTabProcess').onclick = () => this.setMainTab('Process');
			}
			setMainTab(tabType) {
				// Remove 'active' class from all tab buttons in #mainTabButtons
				Array.from(document.querySelectorAll('#mainTabButtons .tab-btn')).forEach(btn => {
					btn.classList.remove('active');
				});
				if (tabType === 'SiteSetting') {
					document.getElementById('mainTabSiteSetting').classList.add('active');
					document.getElementById('siteSettingArea').style.display = '';
					document.getElementById('erDiagramArea').style.display = 'none';
					document.getElementById('processArea').style.display = 'none';
					try { this.site.renderFromData(Common.parseJsonSafe()); } catch (ex) { console.error(ex); }
				} else if (tabType === 'ERDiagrams') {
					document.getElementById('mainTabERDiagrams').classList.add('active');
					document.getElementById('siteSettingArea').style.display = 'none';
					document.getElementById('erDiagramArea').style.display = '';
					document.getElementById('processArea').style.display = 'none';
					try { this.er.renderFromData(Common.parseJsonSafe()); } catch (ex) { console.error(ex); }
				} else if (tabType === 'Process') {
					document.getElementById('mainTabProcess').classList.add('active');
					document.getElementById('siteSettingArea').style.display = 'none';
					document.getElementById('erDiagramArea').style.display = 'none';
					document.getElementById('processArea').style.display = '';
					try { this.process.renderFromData(Common.parseJsonSafe()); } catch (ex) { console.error(ex); }
				}
			}
			start() {
				// 初期表示用
				const sampleJson = ``;
				if (!Common.textarea.value) Common.textarea.value = sampleJson;

				// show/hide main tab buttons based on available views
				this.showTabButtons = (views) => {
					const tabDiv = document.getElementById('mainTabButtons');
					const erArea = document.getElementById('erDiagramArea');
					const hasTabs = views.length > 1;
					// タブバーは常に表示する（ボタンの個別表示は各ビューの有無で制御される）
					if (tabDiv) tabDiv.style.display = '';
					// ER図エリアはタブが無い場合に上に広げる
					if (erArea) {
						if (!hasTabs) {
							erArea.classList.add('no-tab');
						} else {
							erArea.classList.remove('no-tab');
						}
					}
				};
				this.getAvailableViews = (data) => {
					const views = [];
					if (Array.isArray(data.SiteSetting?.Sites) && data.SiteSetting.Sites.length > 0) views.push('SiteSetting');
					if (Array.isArray(data.ERDiagrams?.Tables) && data.ERDiagrams.Tables.length > 0) views.push('ERDiagrams');
					if (Array.isArray(data.Process?.Processes) && data.Process.Processes.length > 0) views.push('Process');
					return views;
				};
				this.refreshViews = () => {
					try {
						const data = Common.parseJsonSafe();
						const views = this.getAvailableViews(data);
						this.showTabButtons(views);
						// 個別ボタンの表示/非表示
						try {
							const btnSite = document.getElementById('mainTabSiteSetting');
							const btnErd = document.getElementById('mainTabERDiagrams');
							const btnProc = document.getElementById('mainTabProcess');
							if (views.length == 1) {
								// ビュー情報が一つしかない場合はボタンを表示しない
								if (btnSite) btnSite.style.display = 'none';
								if (btnErd) btnErd.style.display = 'none';
								if (btnProc) btnProc.style.display = 'none';
							} else if (views.length > 1) {
								if (btnSite) btnSite.style.display = views.includes('SiteSetting') ? '' : 'none';
								if (btnErd) btnErd.style.display = views.includes('ERDiagrams') ? '' : 'none';
								if (btnProc) btnProc.style.display = views.includes('Process') ? '' : 'none';
							} else {
								// ビュー情報が空の場合は既定のボタンを表示する
								if (btnSite) btnSite.style.display = '';
								if (btnErd) btnErd.style.display = '';
								if (btnProc) btnProc.style.display = '';
							}
						} catch (ex) { }
						if (views.length === 1) {
							this.setMainTab(views[0]);
							return;
						}
						// 優先順: SiteSetting -> ERDiagrams -> Process
						if (views.includes('SiteSetting')) this.setMainTab('SiteSetting');
						else if (views.includes('ERDiagrams')) this.setMainTab('ERDiagrams');
						else if (views.includes('Process')) this.setMainTab('Process');
					} catch {}
				};
				if (!location.href.startsWith('file://')) {
					const userInputDiv = document.querySelector('.user-input');
					if (userInputDiv) userInputDiv.style.display = 'none';
					document.getElementById('tableContainer').innerHTML = `<span style="color:black;">${t('common_data_loading')}</span>`;
					fetch(location.href.replace('Viewer=html', 'Viewer=none'))
						.then(res => { if (!res.ok) throw new Error('データ取得失敗'); return res.json(); })
						.then(json => {
							document.getElementById('tableContainer').innerHTML = ``;
							Common.textarea.value = JSON.stringify(json, null, 2);
							this.site.loadSites(json);
							this.site.renderTable();
							Common.updateGearErrorIndicator();
							Common.positionGearErrorIndicator();
							this.showTabButtons(this.getAvailableViews(json));
							this.refreshViews();
						})
						.catch(e => {
							document.getElementById('tableContainer').innerHTML = `<span style="color:red;">${t('common_data_load_failed')}: ${Common.escapeHtml(e.message)}</span>`;
						});
				} else {
					try {
						const userInputDiv = document.querySelector('.user-input');
						if (userInputDiv) userInputDiv.style.display = '';
						const data = Common.parseJsonSafe();
						this.site.loadSites(data);
						this.refreshViews();
					} catch { }
				}
				Common.updateGearErrorIndicator();
				Common.positionGearErrorIndicator();
				// 初回高さ調整
				requestAnimationFrame(() => {
					const erArea = document.getElementById('erDiagramArea');
					let prevDisplay = '';
					if (erArea) {
						prevDisplay = erArea.style.display;
						erArea.style.display = '';
					}
					App.adjustMermaidScrollWrapperHeight();
					if (erArea) {
						erArea.style.display = prevDisplay;
					}
				});
			}
			static adjustMermaidScrollWrapperHeight() {
				const erArea = document.getElementById('erDiagramArea');
				const wrapper = document.getElementById('mermaidScrollWrapper');
				const btnBar = erArea ? erArea.querySelector('#erDiagramContainer > div:first-child') : null;
				if (erArea && wrapper && btnBar) {
					const erAreaRect = erArea.getBoundingClientRect();
					const btnBarRect = btnBar.getBoundingClientRect();
					const topOffset = btnBarRect.bottom - erAreaRect.top;
					const newHeight = Math.max(120, erAreaRect.height - topOffset - 16); // 16px: 余白
					wrapper.style.height = newHeight + 'px';

				}
			}
		}

		// 起動
		window.addEventListener('DOMContentLoaded', () => {
			const app = new App();
			app.start();
		});

		// ファイル名生成関数追加
		function vsFilename(feature, ext) {
			function dateStr() {
				const pad = n => n.toString().padStart(2, '0');
				const d = new Date();
				const yyyy = d.getFullYear();
				const MM = pad(d.getMonth() + 1);
				const dd = pad(d.getDate());
				const hh = pad(d.getHours());
				const mm = pad(d.getMinutes());
				const ss = pad(d.getSeconds());
				return `${yyyy}_${MM}_${dd} ${hh}_${mm}_${ss}`;
			}
			const prefix = 'VisualizeSettings_';
			const suffix = dateStr();
			const extension = ext.toLowerCase();
			return `${prefix}${feature}_${suffix}.${extension}`;
		}

		class I18n {
			constructor(langs, fallback = "en") {
				this.langs = langs;
				this.fallback = fallback;
				this.currentLang = this.detectLang();
			}
			detectLang() {
				const browserLang = navigator.language.slice(0, 2);
				return this.langs[browserLang] ? browserLang : this.fallback;
			}
			setLang(lang) {
				if (this.langs[lang]) {
					this.currentLang = lang;
					this.applyTranslations();
				}
			}
			t(key, ...args) {
				let str = this.langs[this.currentLang]?.[key]
					?? this.langs[this.fallback]?.[key]
					?? key;
				args.forEach((arg, i) => {
					str = str.replace(`{${i}}`, arg);
				});
				return str;
			}
			applyTranslations() {
				document.querySelectorAll("[data-i18n]").forEach(el => {
					const key = el.dataset.i18n;
					const attr = el.dataset.i18nAttr;
					const txt = this.t(key);
					if (txt) {
						if (attr) {
							el.setAttribute(attr, txt);
						} else if (el.tagName === "INPUT" || el.tagName === "TEXTAREA") {
							el.setAttribute("placeholder", txt);
						} else if (el.tagName === "IMG") {
							el.setAttribute("alt", txt);
						} else if (el.tagName === "TITLE") {
							document.title = txt;
						} else {
							el.textContent = txt;
						}
					}
				});
			}
		}
		const i18n = new I18n(LANG_DATA, "en");
		function t(key, ...args) { return i18n.t(key, ...args); }
		// 言語確認用機能
		if (false) {
			const dlg = document.createElement('div');
			dlg.style.zIndex = 9999;
			dlg.style.position = 'fixed';
			dlg.style.top = '20px';
			dlg.style.left = '327px';
			dlg.style.padding = '10px';
			dlg.style.backgroundColor = '#eef';
			dlg.innerHTML = `
				<select id="langSelector">
					<option value="ja">Japanese</option>
					<option value="en">English</option>
				</select>
			`;
			document.body.appendChild(dlg);
			document.getElementById("langSelector").addEventListener("change", e => {
				i18n.setLang(e.target.value);
			});
		}
	</script>
